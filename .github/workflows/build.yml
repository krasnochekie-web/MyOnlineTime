name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.0'

    - name: Build Release APK
      run: gradle assembleRelease

    - name: Sign APK securely
      env:
        KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        KEY_PASS: ${{ secrets.KEY_PASSWORD }}
      run: |
        # Расшифровываем ключ из сейфа
        echo "$KEYSTORE_B64" | base64 --decode > mykey.keystore
        
        # Находим утилиту apksigner на сервере
        BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools | tail -1)
        APKSIGNER=$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner
        
        # Подписываем APK твоим ключом!
        $APKSIGNER sign --ks mykey.keystore --ks-pass "pass:$KEY_PASS" --out app-release-signed.apk app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: MyOnlineTime-Official-APK
        path: app-release-signed.apk
