name: Purge All Artifacts

on:
  workflow_dispatch: # Эта строчка создает кнопку "Запустить вручную" в интерфейсе GitHub

jobs:
  delete-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Ищем и удаляем все артефакты в репозитории..."
          gh api repos/${{ github.repository }}/actions/artifacts \
            --paginate -q '.artifacts.[].id' | \
            xargs -r -I{} gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/{}
          echo "Очистка завершена! Свобода хранилищу!"
